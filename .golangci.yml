version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocritic
    - misspell

formatters:
  enable:
    - gofmt
    - goimports

settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
  errcheck:
    check-blank: false
  goimports:
    local-prefixes: github.com/couchbaselabs/sequoia

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
