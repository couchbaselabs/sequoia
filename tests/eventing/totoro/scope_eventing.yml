---
users:
  -
      name: bucket_op
      password: password
      roles: admin
      auth_domain: local
  -
      name: curl_op
      password: password
      roles: admin
      auth_domain: local
  -
      name: timer_op
      password: password
      roles: admin
      auth_domain: local
  -
      name: source_op
      password: password
      roles: admin
      auth_domain: local
  -
      name: n1ql_op
      password: password
      roles: admin
      auth_domain: local
  -
      name: analytics_op
      password: password
      roles: admin
      auth_domain: local
  -
      name: fts_op
      password: password
      roles: admin
      auth_domain: local
  -
      name: src_bucket
      password: password
      roles: admin
      auth_domain: local
  -
      name: metadata
      password: password
      roles: admin
      auth_domain: local

buckets:
  -
      name: bucket_op
      ram: 25%
      eviction: fullEviction
      storage: couchstore
      conflictresolution: timestamp
      rank: 2
  -
      name: timer_op
      ram: 4%
      eviction: fullEviction
      vbuckets: 1024
      historyretentionbytes: 2147483648
      historyretentionseconds: 3600
      enablehistoryretentionbydefault: 1
      conflictresolution: timestamp
  -
      name: source_op
      ram: 25%
      eviction: fullEviction
      vbuckets: 1024
      historyretentionbytes: 2147483648
      historyretentionseconds: 3600
      enablehistoryretentionbydefault: 1
      conflictresolution: timestamp
      enableEncryptionAtRest: true
      dekLifetime: 100
      dekRotateEvery: 50
      ddocs: scale
      compression: active
  -
      name: n1ql_op
      ram: 4%
      eviction: fullEviction
      storage: couchstore
  -
      name: analytics_op
      ram: 4%
  -
      name: fts_op
      ram: 4%
  -
      name: curl_op
      ram: 4%
  -
      name: src_bucket
      ram: 22%
      eviction: fullEviction
      replica: 2
      dekLifetime: 100
      dekRotateEvery: 50
      ddocs: scale
      compression: active
      rank: 1
      enableEncryptionAtRest: true
  -
      name: metadata
      ram: 3%

servers: # each server tag represents a cluster
  -
      name: local
      count: 20
      ram: 90%
      eventing_ram: 90%
      index_ram: 90%
      analytics_ram: 90%
      fts_ram: 80%
      init_nodes: 14
      enable_encryption_at_rest: true
      enable_client_certificate_handling: true
      dekRotateEvery: 50
      dekLifetime: 100
      services:
        eventing: 3
        index: 2
        query: 2
        analytics: 2
        fts: 2
      rest_port: 8091
      data_path: "/data"
      index_path: "/data"
      rest_username: Administrator
      rest_password: password
      buckets: bucket_op,source_op,timer_op,curl_op,n1ql_op,analytics_op,fts_op,src_bucket,metadata
      users: bucket_op,source_op,timer_op,curl_op,n1ql_op,analytics_op,fts_op,src_bucket,metadata
