-
  include: tests/templates/kv.yml, tests/templates/vegeta.yml, tests/templates/rebalance.yml, tests/templates/n1ql.yml

####### cleanup stale handlers from previous runs #####
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o undeploy"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o wait_for_state --state undeployed"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o delete"
  wait: true

####### create index for different buckets for validation #####
- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.Bucket}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 1}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 2}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 3}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 4}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 5}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 6}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 7}}'"
  wait: true


##### create scope and collections ####
-
  image: sequoiatools/collections:1.0
  command: "-i {{.Orchestrator}}:8091 -b {{.Bucket}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 1}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 2}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 3}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 4}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 5}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 6}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 7}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 8}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true

####### load data into few collections #######
-
  image: sequoiatools/gideon_latest
  command: "kv --ops {{.Scale 5000}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.Bucket}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 5000}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.NthBucket 1}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 5000}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.NthBucket 2}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 5000}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.NthBucket 3}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 5000}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.NthBucket 4}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 5000}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.NthBucket 5}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 5000}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.NthBucket 6}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 5000}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.NthBucket 7}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000

- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.Bucket}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 1}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 2}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 3}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 4}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 5}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 6}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 7}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"

#### create handlers #####
- foreach: "{{range $i, $sc := mkrange 0 1}}"
  image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{$.Bucket}}.scope_0.coll{{$sc}} -m {{$.NthBucket 8}}.scope_0.coll{{$sc}} -d dst_bucket.{{$.Bucket}}.scope_1.coll{{$sc}}.rw -d dst_bucket2.{{$.NthBucket 2}}.scope_0.coll{{$sc}}.rw  -t bucket_op_sbm -o create --name bucket_op{{$sc}}"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{.NthBucket 1}}.*.* -m {{.NthBucket 8}}.scope_1.coll0 -d dst_bucket.{{.NthBucket 1}}.*.*.rw -t timers -o create --name timers"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{.NthBucket 6}}.scope_0.* -m {{.NthBucket 8}}.scope_2.coll0 -d dst_bucket.{{.NthBucket 6}}.scope_0.*.rw -t curl -o create --name curl"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{.NthBucket 3}}.*.* -m {{.NthBucket 8}}.scope_3.coll0 -d dst_bucket.{{.NthBucket 3}}.scope_0.coll0.rw -t n1ql -o create --name n1ql"
  wait: true
- foreach: "{{range $i, $sc := mkrange 0 1}}"
  image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{$.NthBucket 2}}.scope_0.coll{{$sc}} -m {{$.NthBucket 8}}.scope_4.coll{{$sc}} -d dst_bucket.{{$.NthBucket 2}}.scope_0.coll{{$sc}}.rw -t sbm -o create --name sbm{{$sc}}"
  wait: true

##### deploy bucket op, timers, N1ql #####
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -o deploy --name bucket_op"
- command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -o deploy --name timers"
- command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -o deploy --name n1ql"


#### wait for handler to be deployed ####
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o wait_for_state --state deployed --name bucket_op"
  wait: true
- command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o wait_for_state --state deployed --name timers"
  wait: true
- command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o wait_for_state --state deployed --name n1ql"
  wait: true

###############  Rebalance-in eventing ################
- template: rebalance_in_wo_wait
  args: "{{.InActiveNode}}, eventing"
  wait: true

###### Start Collections CRUD on bucket_op ignore scope_1 and scope_2
-
  image: sequoiatools/collections:1.0
  command: "-i {{.Orchestrator}}:8091 -b {{.Bucket}} -o crud_mode --crud_interval=10 --max_scopes=10 --max_collections=100 --ignore_scope scope_0 --ignore_scope scope_1 --ignore_collection coll-0 --ignore_collection coll-1 --ignore_collection coll-2 --ignore_collection coll-3 --ignore_collection coll-4"
  alias: collection_crud1

-
  template: wait_for_rebalance
  wait: true

####### load data into all collections #######
-
  image: sequoiatools/gideon_latest
  command: "kv --ops {{.Scale 500}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.Bucket}} --scope scope_0 --collection coll0,coll1"
  duration: 1000
- command: "kv --ops {{.Scale 200}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.NthBucket 7}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 200}} --create 30 --get 70  --hosts {{.Orchestrator}} --bucket {{.NthBucket 7}} --scope scope_1 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000

###############  Rebalance-in multiple kv nodes################
-
  template: add_node
  args: "{{.NthInActiveNode 0}}"
- args: "{{.NthInActiveNode 1}}"
  wait: true

-
  template: rebalance
  wait: true

##### deploy curl, sbm #####
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -o deploy --name curl"
- command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -o deploy --name sbm"

#### wait for handler to be deployed ####
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o wait_for_state --state deployed"
  wait: true


###############  Rebalance-out multiple kv nodes ################
- template: rebalance_out
  args: "({{.ActiveDataNode 1}},{{.ActiveDataNode 2}})"
  wait: true

#### pause bucket op,timers ####
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -o pause --name bucket_op"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -o pause --name timers"
  wait: true


###############  Swap Rebalance kv ################
- template: rebalance_swap
  args: "{{.NthInActiveNode 0}},{{.ActiveDataNode 2}}, data"
  wait: true

- template: rebalance_swap
  args: "{{.NthInActiveNode 0}},{{.ActiveDataNode 2}}, data"
  wait: true

#### wait for bucket handler to be paused and curl,sbm to be deployed ####
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o wait_for_state --state paused --name bucket_op"
