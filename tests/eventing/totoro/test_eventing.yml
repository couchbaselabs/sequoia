-
  include: tests/templates/kv.yml, tests/templates/vegeta.yml, tests/templates/rebalance.yml, tests/templates/n1ql.yml, tests/templates/analytics.yml, tests/templates/bucket.yml

###### update Tombstone Purge Interval ######
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "setting-compaction -c {{.Orchestrator}} -u  {{.RestUsername}} -p  {{.RestPassword}} --metadata-purge-interval 0.25 --compaction-db-percentage 30 --compaction-view-percentage 30"
  wait: true

###### enable n2n encryption & ipv4only ######
-
  template: disable_autofailover
  requires:  "{{eq true .DoOnce }}"
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "node-to-node-encryption -c {{.Orchestrator}}:8091 -u {{.RestUsername}} -p {{.RestPassword}} --enable"
  wait: true
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "setting-security -c {{.Orchestrator}}:8091 -u {{.RestUsername}} -p {{.RestPassword}} --set --cluster-encryption-level control"
  wait: true
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "ip-family -c {{.Orchestrator}}:8091 -u {{.RestUsername}} -p {{.RestPassword}} --set --ipv4only"
  wait: true
-
  template: enable_autofailover
  args: "120,1"
  requires:  "{{eq true .DoOnce }}"

####### cleanup stale handlers from previous runs #####
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o undeploy"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o wait_for_state --state undeployed"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{.EventingNode}} -u {{.RestUsername}} -p {{.RestPassword}} -o delete"
  wait: true

####### create index for different buckets for validation #####
- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.Bucket}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 1}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 2}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 3}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 4}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 5}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 6}}'"
  wait: true

- template: cbq
  requires:  "{{eq true .DoOnce }}"
  args: "'create PRIMARY INDEX on {{.NthBucket 7}}'"
  wait: true


##### create scope and collections ####
-
  image: sequoiatools/collections:1.0
  command: "-i {{.Orchestrator}}:8091 -b {{.Bucket}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 1}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 2}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 3}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 4}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 5}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 6}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 7}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 8}} -o create_multi_scope_collection -s scope_ -c coll --scope_count=10 --collection_count=100 --collection_distribution=uniform"
  wait: true

##### create analytics shadow dataset on analytics_op #####
- image: sequoiatools/analyticsmanager:1.0
  command: "-i {{.AnalyticsNode | noport}} -b {{.NthBucket 5}} -o create_cbas_infra --dv_cnt 1 --ds_cnt 2 --idx_cnt 2 --data_src gideon --inc_scp scope_0 --inc_coll coll0 -w false --ingestion_timeout 1800 --api_timeout 3600"
  wait: true

##### create FTS index on fts_op #####
- image: sequoiatools/ftsindexmanager
  command: "-n {{.FTSNode}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 6}} -m 1:0:1 -s 1 -sc scope_0 -coll coll0 -a create_index_from_map"
  wait: true

############### load vector datasets with xattrs ################
- image: sequoiatools/govectorloader
  command: "-nodeAddress={{$.Orchestrator}} -username=Administrator -password=password -bucketName={{.NthBucket 6}} -scopeName=scope_0 -collectionName=coll0 -startIndex=0 -endIndex=150000 -datasetName=sift -xattrFlag=True -percentagesToResize=1 -dimensionsForResize=1536 -provideDefaultDocs=True"
  requires: "{{eq true $.DoOnce }}"
  wait: true

############### data loading for fts bucket ################
- image: sequoiatools/catapult
  command: "-i {{.Orchestrator}} -u Administrator -p password -b {{.NthBucket 6}} -n {{.Scale 100000}} -pc 50 -pu 25 -pd 25
    -dt Hotel -de {{.Scale 10000}} -nt 1 -ds 1000 -lf True -li 60 -fu price,free_parking -sc scope_0 -coll coll0"

############### initial data loading ################
- image: sequoiatools/magmaloader
  command: "--host {{.Orchestrator}} --user Administrator --password password --bucket {{.Bucket}} --start 0 --end 10000 --doc_template Hotel --all_coll true"
  requires: "{{eq true .DoOnce }}"
  wait: true
- command: "--host {{.Orchestrator}} --user Administrator --password password --bucket {{.NthBucket 1}} --start 0 --end 10000 --doc_template Hotel --all_coll true"
  requires: "{{eq true .DoOnce }}"
  wait: true

####### load data into few collections #######
-
  image: sequoiatools/gideon_latest
  command: "kv --ops {{.Scale 10000}} --create 60 --get 20 --delete 20  --hosts {{.Orchestrator}} --bucket {{.Bucket}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 10000}} --create 60 --get 20 --delete 20  --hosts {{.Orchestrator}} --bucket {{.NthBucket 1}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 10000}} --create 60 --get 20 --delete 20  --hosts {{.Orchestrator}} --bucket {{.NthBucket 2}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 10000}} --create 60 --get 20 --delete 20  --hosts {{.Orchestrator}} --bucket {{.NthBucket 3}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 10000}} --create 60 --get 20 --delete 20  --hosts {{.Orchestrator}} --bucket {{.NthBucket 4}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 10000}} --create 60 --get 20 --delete 20  --hosts {{.Orchestrator}} --bucket {{.NthBucket 5}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 10000}} --create 60 --get 20 --delete 20  --hosts {{.Orchestrator}} --bucket {{.NthBucket 6}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000
- command: "kv --ops {{.Scale 10000}} --create 60 --get 20 --delete 20  --hosts {{.Orchestrator}} --bucket {{.NthBucket 7}} --scope scope_0 --collection coll0,coll1,coll2,coll3,coll4"
  duration: 1000

- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.Bucket}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 1}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 2}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 3}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 4}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 5}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 6}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 7}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"

#### create handlers #####
- foreach: "{{range $i, $sc := mkrange 0 1}}"
  image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{$.Bucket}}.scope_0.coll{{$sc}} -m {{$.NthBucket 8}}.scope_0.coll{{$sc}} -d dst_bucket.{{$.Bucket}}.scope_1.coll{{$sc}}.rw -d dst_bucket2.{{$.NthBucket 2}}.scope_0.coll{{$sc}}.rw  -t multiple_bucket_op -o create --name bucket_op{{$sc}}"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{.NthBucket 2}}.*.* -m {{.NthBucket 8}}.scope_1.coll0 -d dst_bucket.{{.NthBucket 2}}.*.*.rw -t timers -o create --name timers"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{.NthBucket 3}}.scope_0.* -m {{.NthBucket 8}}.scope_2.coll0 -d dst_bucket.{{.NthBucket 3}}.scope_0.*.rw -t curl -o create --name curl"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{.NthBucket 3}}.*.* -m {{.NthBucket 8}}.scope_3.coll0 -d dst_bucket.{{.NthBucket 4}}.scope_0.coll0.rw -t n1ql -o create --name n1ql"
  wait: true
- foreach: "{{range $i, $sc := mkrange 0 1}}"
  image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{$.NthBucket 1}}.scope_0.coll{{$sc}} -m {{$.NthBucket 8}}.scope_4.coll{{$sc}} -d dst_bucket.{{$.NthBucket 1}}.scope_0.coll{{$sc}}.rw -t sbm -o create --name sbm{{$sc}}"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{.NthBucket 5}}.scope_0.* -m {{.NthBucket 8}}.scope_5.coll0 -d dst_bucket.{{.NthBucket 7}}.scope_0.coll0.rw -t analytics -o create --name analytics --analytics_node {{.AnalyticsNode | noport}}"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u {{$.RestUsername}} -p {{$.RestPassword}} -s {{.NthBucket 6}}.scope_0.* -m {{.NthBucket 8}}.scope_6.coll0 -d dst_bucket.{{.NthBucket 7}}.scope_1.coll0.rw -t fts -o create --name fts --fts_node {{.FTSNode | noport}}"
  wait: true

##### create RBAC user and handler as non-admin user #####
- image: sequoiatools/couchbase-cli:8.1
  command: "user-manage -c {{.Orchestrator}} -u {{.RestUsername}} -p {{.RestPassword}} --rbac-username eventing_rbac --rbac-password password --roles eventing_admin,bucket_admin[bucket_op] --auth-domain local --set"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u eventing_rbac -p password -s {{.Bucket}}.scope_0.coll2 -m {{.NthBucket 8}}.scope_7.coll0 -d dst_bucket.{{.Bucket}}.scope_0.coll2.rw -t bucket_op -o create --name bucket_op_rbac"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u eventing_rbac -p password -o deploy --name bucket_op_rbac"
  wait: true
- image: sequoiatools/eventing:8.1
  command: "eventing_helper.py -i {{$.EventingNode}} -u eventing_rbac -p password -o wait_for_state --state deployed --name bucket_op_rbac"
  wait: true

