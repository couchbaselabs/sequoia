# set expiry on some docs
- image: sequoiatools/magmaloader
  command: "--host {{.Orchestrator}} --user Administrator --password password --bucket {{.Bucket}} --start 10000 --end 200000 --doc_template Hotel --all_coll true --expiry_mode true --max_ttl 1200 --percentage_expiry 50"
