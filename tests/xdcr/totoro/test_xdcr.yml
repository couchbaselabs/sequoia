- include: tests/templates/rebalance.yml, tests/templates/multinode_failure.yml, tests/templates/stats.yml, tests/templates/kv.yml, tests/templates/xdcr.yml

###### update Tombstone Purge Interval ######
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "setting-compaction -c {{.Orchestrator}} -u  {{.RestUsername}} -p  {{.RestPassword}} --metadata-purge-interval 0.25 --compaction-db-percentage 30 --compaction-view-percentage 30"
  wait: true

###### enable n2n encryption & ipv4only ######
-
  template: disable_autofailover
  requires:  "{{eq true .DoOnce }}"
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "node-to-node-encryption -c {{.Orchestrator}}:8091 -u {{.RestUsername}} -p {{.RestPassword}} --enable"
  wait: true
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "setting-security -c {{.Orchestrator}}:8091 -u {{.RestUsername}} -p {{.RestPassword}} --set --cluster-encryption-level control"
  wait: true
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "ip-family -c {{.Orchestrator}}:8091 -u {{.RestUsername}} -p {{.RestPassword}} --set --ipv4only"
  wait: true
-
  template: enable_autofailover
  args: "120,1"
  requires:  "{{eq true .DoOnce }}"

# Create buckets outside of scope file as we want different types of buckets/vbuckets with different settings to test various xdcr scenarios.
-
  image: sequoiatools/couchbase-cli:8.1
  command:  "bucket-create -c {{.Orchestrator}}:{{.RestPort}} -u  {{.RestUsername}} -p  {{.RestPassword}} --bucket=bucket5_magma  --bucket-ramsize 2281 --bucket-type couchbase --bucket-replica 1 --enable-flush 1 --wait --bucket-eviction-policy fullEviction --conflict-resolution timestamp"
  wait: true
-
  image: sequoiatools/couchbase-cli:8.1
  command:  "bucket-create -c {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -u  {{.RestUsername}} -p  {{.RestPassword}} --bucket=bucket5_couchstore --bucket-ramsize 2281 --bucket-type couchbase --bucket-replica 1 --enable-flush 1 --wait --bucket-eviction-policy fullEviction --storage-backend couchstore --conflict-resolution timestamp"
  wait: true

#=========== create collections across 6 buckets per cluster, 10K total per cluster (2000x4 + 1000x2) =============
- image: sequoiatools/collections:1.0
  command: "-i {{.Orchestrator}}:{{$.RestPort}} -b {{.Bucket}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=10 --collection_count=2000"
- command: "-i {{.Orchestrator}}:{{$.RestPort}} -b {{.NthBucket 1}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=10 --collection_count=2000"
- command: "-i {{.Orchestrator}}:{{$.RestPort}} -b {{.NthBucket 2}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=10 --collection_count=2000"
- command: "-i {{.Orchestrator}}:{{$.RestPort}} -b {{.NthBucket 3}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=10 --collection_count=2000"
- command: "-i {{.Orchestrator}}:{{$.RestPort}} -b {{.NthBucket 4}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=10 --collection_count=1000"
- command: "-i {{.Orchestrator}}:{{$.RestPort}} -b bucket5_magma -o create_multi_scope_collection
              -s scope- -c coll --scope_count=10 --collection_count=1000"

- image: sequoiatools/collections:1.0
  command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -b {{.Bucket}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=5 --collection_count=2000"
- command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -b {{.NthBucket 1}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=5 --collection_count=2000"
- command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -b {{.NthBucket 2}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=5 --collection_count=2000"
- command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -b {{.NthBucket 3}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=5 --collection_count=2000"
- command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -b {{.NthBucket 4}} -o create_multi_scope_collection
            -s scope- -c coll --scope_count=5 --collection_count=1000"
- command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -b bucket5_couchstore -o create_multi_scope_collection
            -s scope- -c coll --scope_count=5 --collection_count=1000"

#============ Initial data load on local ============
- image: sequoiatools/catapult
  command: "-i {{.Orchestrator}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.Bucket}} -n {{.Scale 500}} -pc 100
  -dt Hotel -ac True"
  wait: true
- command: "-i {{.Orchestrator}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 1}} -n {{.Scale 500}} -pc 100
  -dt Person -ac True"
  wait: true
# Initial load runs async (no wait) and the pillowfight loads repeat forever
# (-c -1); they're aliased so the baseline differ block can stop them and let
# replication drain to an exact per-collection count before validating.
# NOTE: the gideon seed is intentionally create-only (no --delete). Deletes here
# would leave tombstones on the source that the uni-directional target never
# materialized, and xdcrDiffer counts tombstones -> a guaranteed source>target
# skew at the baseline differ. Delete coverage is exercised later by the
# continuous-CRUD section (validated by the xdcrmanager item-count checks).
- image: sequoiatools/gideon:3.0.0a4
  command: "kv --ops {{.Scale 500}} --create 90 --get 10 --delete 0  --hosts {{.Orchestrator}} --bucket {{.Bucket}} --durability majority"
  alias: load_bucket0
- image: sequoiatools/gideon:3.0.0a4
  command: "kv --ops {{.Scale 500}} --create 90 --get 10 --delete 0  --hosts {{.Orchestrator}} --bucket {{.NthBucket 1}} --durability majority"
  alias: load_bucket1
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 2}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 3000}}, {{.AuthPassword}} --durability majority -c -1 --json"
  alias: load_bucket2
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 3}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 2000}}, {{.AuthPassword}} --durability majority -c -1 --json"
  alias: load_bucket3
- template: pillowfight_durability
  args: "{{.Orchestrator}}, {{.NthBucket 4}}, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 2000}}, {{.AuthPassword}} --durability majority -c -1 --json"
  alias: load_bucket4
- template: pillowfight_durability
  args: "{{.Orchestrator}}, bucket5_magma, -M 128 -I {{.Scale 10000}} -B {{.Scale 500}} -t 1  --rate-limit {{.Scale 2000}}, {{.AuthPassword}} --durability majority -c -1 --json"
  alias: load_bucket5

# Enable cross-cluster versioning for few buckets ######
- image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "bucket-edit -c {{.Orchestrator}}:{{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} --bucket {{.NthBucket 1}} --enable-cross-cluster-versioning --force"
  wait: true
- command: "bucket-edit -c {{.Orchestrator}}:{{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} --bucket {{.NthBucket 4}} --enable-cross-cluster-versioning --force"
  wait: true

# Enable cross-cluster versioning in remote cluster
- image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "bucket-edit -c {{.Nodes | .Cluster 1 | net 0}}:{{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} --bucket {{.Nodes | .Cluster 1 | bucket 1}} --enable-cross-cluster-versioning --force"
  wait: true
- command: "bucket-edit -c {{.Nodes | .Cluster 1 | net 0}}:{{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} --bucket {{.Nodes | .Cluster 1 | bucket 4}} --enable-cross-cluster-versioning --force"
  wait: true

#============ get remote cluster pem  ============
- image:  appropriate/curl
  command: "-o /tmp/remote_cluster.pem -u {{.Nodes | .Cluster 1 | .Attr `rest_username`}}:{{.Nodes | .Cluster 1 | .Attr `rest_password`}} http://{{.Nodes | .Cluster 1 | net 0}}:{{$.RestPort}}/pools/default/certificate"
  volumes: "/tmp:/tmp"
  wait: true

#============ Create replications ============
- image: sequoiatools/couchbase-cli:8.1
  command:  "xdcr-setup -c {{.Orchestrator}}:{{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} 
        --create --xdcr-cluster-name remote
        --xdcr-hostname {{.Nodes | .Cluster 1 | net 0}}
        --xdcr-username {{.Nodes | .Cluster 1 | .Attr `rest_username`}}
        --xdcr-password {{.Nodes | .Cluster 1 | .Attr `rest_password`}}
        --xdcr-secure-connection full  --xdcr-certificate /tmp/remote_cluster.pem"
  volumes: "/tmp:/tmp"
  wait: true

- command:  "xdcr-setup -c {{.Nodes | .Cluster 1 | net 0}} -u {{.RestUsername}} -p {{.RestPassword}}  
        --create --xdcr-cluster-name remote
        --xdcr-hostname {{.Orchestrator}}
        --xdcr-username {{.RestUsername}}
        --xdcr-password {{.RestPassword}}"
  wait: true

# unidirectional : C1.bucket0 -> C2.bucket0
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket {{.Bucket}}
        --xdcr-to-bucket {{.Bucket}}"
  wait: true

# unidirectional : C1.bucket1 -> C2.bucket1
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket {{.NthBucket 1}}
        --xdcr-to-bucket {{.NthBucket 1}}
        --enable-compression 1
        --conflict-logging 1
        --conflict-logging-default bucket0.scope-0.coll0
        --force"
  wait: true

# bi-directional: C1.bucket2 <-> C2.bucket2
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket {{.NthBucket 2}}
        --xdcr-to-bucket {{.NthBucket 2}}"
  wait: true

- command: "xdcr-replicate -c {{.Nodes | .Cluster 1 | net 0}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket {{.NthBucket 2}}
        --xdcr-to-bucket {{.NthBucket 2}}"
  wait: true

# unidirectional : C1.bucket3 -> C2.bucket3
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket {{.NthBucket 3}}
        --xdcr-to-bucket {{.NthBucket 3}}"
  wait: true

# unidirectional : C2.bucket4 -> C1.bucket4
- command: "xdcr-replicate -c {{.Nodes | .Cluster 1 | net 0}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket {{.NthBucket 4}}
        --xdcr-to-bucket {{.NthBucket 4}}
        --enable-compression 1
        --conflict-logging 1
        --conflict-logging-default bucket0.scope-0.coll0
        --force"
  wait: true

# bidirectional: C1.bucket5_magma <-> C2.bucket5_couchstore
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket bucket5_magma
        --xdcr-to-bucket bucket5_couchstore"
  wait: true

- command: "xdcr-replicate -c {{.Nodes | .Cluster 1 | net 0}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket bucket5_couchstore
        --xdcr-to-bucket bucket5_magma"
  wait: true

#============ baseline collection-level validation (xdcrDiffer strict no-diff) ============
# Per-collection key-by-key check right after replications + initial load, before any
# cluster ops / chaos. The differ is a point-in-time check, so it is only meaningful
# against a quiesced system: stop the still-running initial-load generators, drain the
# in-flight mutations across XDCR, THEN diff. The initial seed is create-only (no
# deletes -> no tombstones), so once the load is stopped and replication drains the
# per-collection counts are exactly identical on source and target; any reported diff
# is a real imbalance, not in-flight drift or tombstone skew.
# Args: source host, source bucket, target bucket, remote-cluster ref name.

# 1) stop the initial-load generators (gideon finite loads may already be gone -> rm is
#    force + error-ignored, so this is safe; pillowfight -c -1 loops are killed here)
-
  client:
    op: rm
    container: load_bucket0
-
  client:
    op: rm
    container: load_bucket1
-
  client:
    op: rm
    container: load_bucket2
-
  client:
    op: rm
    container: load_bucket3
-
  client:
    op: rm
    container: load_bucket4
-
  client:
    op: rm
    container: load_bucket5

# 2) drain: let the last in-flight mutations finish replicating to the targets
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# 3) per-collection strict no-diff on each genuine replication pair
- template: differ-replication
  args: "{{.Orchestrator}},{{.Bucket}},{{.Bucket}},remote"
  wait: true
- template: differ-replication
  args: "{{.Orchestrator}},{{.NthBucket 1}},{{.NthBucket 1}},remote"
  wait: true
- template: differ-replication
  args: "{{.Orchestrator}},{{.NthBucket 2}},{{.NthBucket 2}},remote"
  wait: true
- template: differ-replication
  args: "{{.Orchestrator}},{{.NthBucket 3}},{{.NthBucket 3}},remote"
  wait: true
# NOTE: bucket4 (C2 -> C1) is intentionally omitted from the baseline. The initial load
# only populated C1.bucket4, so at baseline the differ source (C2.bucket4) is empty while
# the target (C1.bucket4) still holds un-replicated initial data -> a guaranteed (false)
# MissingFromSource that no amount of draining fixes. It is exercised by the later
# xdcrmanager item-count checks once the continuous CRUD has loaded C2.bucket4.
- template: differ-replication
  args: "{{.Orchestrator}},bucket5_magma,bucket5_couchstore,remote"
  wait: true

#============ Cluster Ops ============
# Rebalance-in node
-
  template: add_node
  args: "{{.NthInActiveNode 0}}"
  wait: true
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true
-
  template: rebalance
  wait: true

# start continuous crud
- image: sequoiatools/catapult
  command: "-i {{.Orchestrator}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.Bucket}}
            -n {{.Scale 100}} -pc 100 -pu 40 -pd 60 -dt Hotel -de 500
            -ac True -sd True -lf True -li 200"
- command: "-i {{.Orchestrator}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 1}}
            -n {{.Scale 200}} -pc 90 -pu 40 -pd 60 -dt Person -de 400
            -ac True -sd True -lf True -li 400"
- command: "-i {{.Orchestrator}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 2}}
            -n {{.Scale 300}} -pc 80 -pu 40 -pd 60 -dt Employee -de 300
            -ac True -sd True -lf True -li 600"
- command: "-i {{.Orchestrator}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 3}}
            -n {{.Scale 400}} -pc 70 -pu 40 -pd 60 -dt Employee -de 200
            -ac True -sd True -lf True -li 800"
- command: "-i {{.Orchestrator}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 4}}
            -n {{.Scale 500}} -pc 60 -pu 40 -pd 60 -dt Employee -de 100
            -ac True -sd True -lf True -li 1000"
- command: "-i {{.Orchestrator}} -u {{.RestUsername}} -p {{.RestPassword}} -b bucket5_magma
            -n {{.Scale 500}} -pc 60 -pu 40 -pd 60 -dt Employee -de 100
            -ac True -sd True -lf True -li 1000"
- command: "-i {{.Nodes | .Cluster 1 | net 0}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 2}}
            -n {{.Scale 600}} -pc 50 -pu 60 -pd 40 -dt Employee -de 600
            -ac True -sd True -lf True -li 1000"
- command: "-i {{.Nodes | .Cluster 1 | net 0}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 4}}
              -n {{.Scale 700}} -pc 40 -pu 40 -pd 60 -dt Employee -de 600
              -ac True -sd True -lf True -li 1000"
- command: "-i {{.Nodes | .Cluster 1 | net 0}} -u {{.RestUsername}} -p {{.RestPassword}} -b bucket5_couchstore
              -n {{.Scale 700}} -pc 40 -pu 40 -pd 60 -dt Employee -de 600
              -ac True -sd True -lf True -li 1000"

#============  Swap Rebalance ################
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true
-
  template: rebalance_swap
  args: "{{.NthInActiveNode 0}},{{.ActiveDataNode 1}}"
  wait: true
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

#============ get replication id ============
- image:  appropriate/curl
  command: "-u {{.RestUsername}}:{{.RestPassword}} http://{{.Orchestrator}}:{{.RestPort}}/pools/default/remoteClusters"
  alias: replId
  wait: true

#============ Delete recreate  ============
# delete replications C1.bucket1 -> C2.bucket1, C1.bucket2 -> C2.bucket2
- image: appropriate/curl
  command: "-u {{.RestUsername}}:{{.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/controller/cancelXDCR/{{(index (.AllLogs `replId` | json) 0).uuid}}%2F{{.NthBucket 1}}%2F{{.NthBucket 1}}
            -X DELETE"
  wait: true
- command: "-u {{.RestUsername}}:{{.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/controller/cancelXDCR/{{(index (.AllLogs `replId` | json) 0).uuid}}%2F{{.NthBucket 2}}%2F{{.NthBucket 2}}
            -X DELETE"
  wait: true

# delete coll-0 to coll-9 in scope-0 to scope-2 in bucket0 to bucket2 on remote and local
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: sequoiatools/collections:1.0
  command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}}
            -b bucket{{$offset}} -o delete -s scope-{{$offset}} -c coll --count 10"
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: sequoiatools/collections:1.0
  command: "-i {{$.Orchestrator}}:{{$.RestPort}}
            -b bucket{{$offset}} -o delete -s scope-{{$offset}} -c coll --count 10"

# recreate replications C1.bucket1 -> C2.bucket1, C1.bucket2 -> C2.bucket2
- image: sequoiatools/couchbase-cli:8.1
  command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket {{.NthBucket 1}}
        --xdcr-to-bucket {{.NthBucket 1}}"
  wait: true
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}}
        --create
        --xdcr-cluster-name remote
        --xdcr-from-bucket {{.NthBucket 2}}
        --xdcr-to-bucket {{.NthBucket 2}}"
  wait: true

# get replication id again after delete-recreate
- image:  appropriate/curl
  command: "-u {{.RestUsername}}:{{.RestPassword}} http://{{.Orchestrator}}:{{.RestPort}}/pools/default/remoteClusters"
  alias: ReplId
  wait: true
- command: "-u {{.RestUsername}}:{{.RestPassword}} http://{{.Nodes | .Cluster 1 | net 0}}:{{.RestPort}}/pools/default/remoteClusters"
  alias: RemoteReplId
  wait: true

# delete scope_0 to scope_4 in bucket0 to bucket2 on C1 and C2
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: sequoiatools/collections:1.0
  command: "-i {{$.Orchestrator}}:{{$.RestPort}} -b bucket{{$offset}} -o delete -s scope --count 5"
  wait: true
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: sequoiatools/collections:1.0
  command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -b bucket{{$offset}} -o delete -s scope --count 5"
  wait: true

# failover and full recover a node
- template: failover_force_and_recover_wait
  args: "{{.ActiveDataNode 1}}, full"
  wait: true

#============ Kill goxdcr ============
-
  template: kill_process
  args: "{{.NthDataNode 1}}, goxdcr"

# Sleep for some more time after goxdcr-kill completes (10 minutes)
-
   image: sequoiatools/cmd
   entrypoint: sleep
   command: "600"
   wait: true

# recreate scope_0 to scope_4 in bucket_0 to bucket_2 on C1 and C2
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: sequoiatools/collections:1.0
  command: "-i {{$.Orchestrator}}:{{$.RestPort}} -b bucket{{$offset}} -o create -s scope --count 5"
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: sequoiatools/collections:1.0
  command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -b bucket{{$offset}} -o create -s scope --count 5"

# recreate coll-0 to coll-9 in scope_0 to scope_2 in bucket_0 to bucket_2 on C1 and C2
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: sequoiatools/collections:1.0
  command: "-i {{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}} -b bucket{{$offset}}
            -o create -s scope-{{$offset}} -c coll --count 10"
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: sequoiatools/collections:1.0
  command: "-i {{$.Orchestrator}}:{{$.RestPort}} -b bucket{{$offset}}
            -o create -s scope-{{$offset}} -c coll --count 10"

##============ pause-sleep-resume 2 times ============
# pause
- image: sequoiatools/couchbase-cli:8.1
  command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}} --pause -u {{.RestUsername}} -p {{.RestPassword}}
            --xdcr-replicator={{(index (.AllLogs `ReplId` | json) 0).uuid}}/{{.Bucket}}/{{.Bucket}}"
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}} --pause -u {{.RestUsername}} -p {{.RestPassword}}
            --xdcr-replicator={{(index (.AllLogs `ReplId` | json) 0).uuid}}/{{.NthBucket 1}}/{{.NthBucket 1}}"
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}} --pause -u {{.RestUsername}} -p {{.RestPassword}}
            --xdcr-replicator={{(index (.AllLogs `ReplId` | json) 0).uuid}}/{{.NthBucket 2}}/{{.NthBucket 2}}"
# sleep
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true
# resume
- image: sequoiatools/couchbase-cli:8.1
  command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}} --resume -u {{.RestUsername}} -p {{.RestPassword}}
            --xdcr-replicator={{(index (.AllLogs `ReplId` | json) 0).uuid}}/{{.Bucket}}/{{.Bucket}}"
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}} --resume -u {{.RestUsername}} -p {{.RestPassword}}
              --xdcr-replicator={{(index (.AllLogs `ReplId` | json) 0).uuid}}/{{.NthBucket 1}}/{{.NthBucket 1}}"
- command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}} --resume -u {{.RestUsername}} -p {{.RestPassword}}
            --xdcr-replicator={{(index (.AllLogs `ReplId` | json) 0).uuid}}/{{.NthBucket 2}}/{{.NthBucket 2}}"
# sleep
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true
# pause
- image: sequoiatools/couchbase-cli:8.1
  command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}} --pause -u {{.RestUsername}} -p {{.RestPassword}}
            --xdcr-replicator={{(index (.AllLogs `ReplId` | json) 0).uuid}}/{{.Bucket}}/{{.Bucket}}"
  wait: true
# kill memcached
- template: memcached_kill
  args: "{{.ActiveDataNode 1}}"
  wait: true
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true
- template: start_memcached
  args: "{{.ActiveDataNode 1}}"
  wait: true
- template: rebalance
  wait: true
# sleep
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true
# resume
- image: sequoiatools/couchbase-cli:8.1
  command: "xdcr-replicate -c {{.Orchestrator}}:{{.RestPort}} --resume -u {{.RestUsername}} -p {{.RestPassword}}
            --xdcr-replicator={{(index (.AllLogs `ReplId` | json) 0).uuid}}/{{.Bucket}}/{{.Bucket}}"
# sleep
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true

#=========== Collections settings =============
# toggle explicit mapping for C1.bucket0 -> C2.bucket0
- image: appropriate/curl
  command: "-u {{$.RestUsername}}:{{$.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/settings/replications/{{(index ($.AllLogs `ReplId` | json) 0).uuid}}%2Fbucket0%2Fbucket0
            -d collectionsExplicitMapping=true
            -d colMappingRules={\"scope-1\":\"scope-1\"}"
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "120"
  wait: true
- image: appropriate/curl
  command: "-u {{$.RestUsername}}:{{$.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/settings/replications/{{(index ($.AllLogs `ReplId` | json) 0).uuid}}%2Fbucket0%2Fbucket0
            -d collectionsExplicitMapping=false"
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "120"
  wait: true
# toggle migration mode for C1.bucket1 -> C1.bucket1
- image: appropriate/curl
  command: "-u {{$.RestUsername}}:{{$.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/settings/replications/{{(index ($.AllLogs `ReplId` | json) 0).uuid}}%2Fbucket1%2Fbucket1
            -d collectionsMigrationMode=true
            -d colMappingRules={\"scope-2\":\"scope-5\"}"
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "120"
  wait: true
- image: appropriate/curl
  command: "-u {{$.RestUsername}}:{{$.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/settings/replications/{{(index ($.AllLogs `ReplId` | json) 0).uuid}}%2Fbucket1%2Fbucket1
            -d collectionsMigrationMode=false"
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "120"
  wait: true

# toggle oso mode for all buckets
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: appropriate/curl
  command: "-u {{$.RestUsername}}:{{$.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/settings/replications/{{(index ($.AllLogs `ReplId` | json) 0).uuid}}%2Fbucket{{$offset}}%2Fbucket{{$offset}}
            -d collectionsOSOMode=false"
  wait: true
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "120"
  wait: true
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: appropriate/curl
  command: "-u {{$.RestUsername}}:{{$.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/settings/replications/{{(index ($.AllLogs `ReplId` | json) 0).uuid}}%2Fbucket{{$offset}}%2Fbucket{{$offset}}
            -d collectionsOSOMode=true"
# migration + advanced filter + oso for C1.bucket2-> C2.bucket2
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: appropriate/curl
  command: "-u {{$.RestUsername}}:{{$.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/settings/replications/{{(index ($.AllLogs `ReplId` | json) 0).uuid}}%2Fbucket2%2Fbucket2
            -d collectionsMigrationMode=true
            -d colMappingRules={\"REGEXP_CONTAINS(META().id,{{$offset}}$)\":\"scope-{{$offset}}.coll-{{$offset}}\"}
            -d filterExpression=EXISTS(country)
            -d collectionsOSOMode=true"
  wait: true

#============ item count check for bucket1 ============
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.Bucket}} -rb {{.Bucket}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.NthBucket 1}} -rb {{.NthBucket 1}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.NthBucket 1}} -rb {{.NthBucket 2}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.NthBucket 1}} -rb {{.NthBucket 3}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.NthBucket 1}} -rb {{.NthBucket 4}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b bucket5_magma -rb bucket5_couchstore"
  wait: true

#============ Cluster Ops ============
# Rebalance-in node
-
  template: add_node
  args: "{{.NthInActiveNode 0}}"
  wait: true
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true
-
  template: rebalance
  wait: true

#============  Swap Rebalance ################
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true
-
  template: rebalance_swap
  args: "{{.NthInActiveNode 0}},{{.ActiveDataNode 1}}"
  wait: true
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# failover and full recover a node
- template: failover_force_and_recover_wait
  args: "{{.ActiveDataNode 2}}, full"
  wait: true

#============ Kill goxdcr ============
-
  template: kill_process
  args: "{{.NthDataNode 1}}, goxdcr"

# Sleep for some more time after goxdcr-kill completes (10 minutes)
-
   image: sequoiatools/cmd
   entrypoint: sleep
   command: "600"
   wait: true

#============ item count check for bucket1 ============
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.Bucket}} -rb {{.Bucket}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.NthBucket 1}} -rb {{.NthBucket 1}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.NthBucket 1}} -rb {{.NthBucket 2}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.NthBucket 1}} -rb {{.NthBucket 3}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b {{.NthBucket 1}} -rb {{.NthBucket 4}}"
  wait: true
- image: sequoiatools/xdcrmanager
  command: "-n {{.Orchestrator}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}}
            -a validate -rn {{.Nodes | .Cluster 1 | net 0}} -ro {{.RestPort}} -ru {{.RestUsername}}
            -rp {{.RestPassword}} -b bucket5_magma -rb bucket5_couchstore"
  wait: true

#============ end-state collection-level validation (xdcrDiffer strict no-diff) ============
# Final per-collection key-by-key gate after the full chaos gauntlet (rebalances,
# swap, failover+recover, goxdcr/memcached kills, pause/resume, delete-recreate of
# scopes/collections). Supplements the bucket-level xdcrmanager item-count checks
# above with a strict no-diff per replication, run before the flush so it sees the
# post-chaos data. The differ's own --retries drains any last in-flight mutations.
# Only buckets still 1:1 implicitly mapped are checked:
#   - bucket2 is EXCLUDED: it ends in migration mode + advanced filter
#     (filterExpression=EXISTS(country)), so source != target BY DESIGN.
#   - bucket4 is EXCLUDED: it replicates C2 -> C1 only while C1.bucket4 also holds
#     its own un-replicated local writes, so the differ source (C2) is a subset of
#     the target (C1) -> guaranteed false MissingFromSource. Covered by the
#     xdcrmanager item-count check instead.
- template: differ-replication
  args: "{{.Orchestrator}},{{.Bucket}},{{.Bucket}},remote"
  wait: true
- template: differ-replication
  args: "{{.Orchestrator}},{{.NthBucket 1}},{{.NthBucket 1}},remote"
  wait: true
- template: differ-replication
  args: "{{.Orchestrator}},{{.NthBucket 3}},{{.NthBucket 3}},remote"
  wait: true
- template: differ-replication
  args: "{{.Orchestrator}},bucket5_magma,bucket5_couchstore,remote"
  wait: true

#=========== Flush all buckets ==============
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: appropriate/curl
  command: "-u {{$.RestUsername}}:{{$.RestPassword}} -X POST
            http://{{$.Nodes | $.Cluster 1 | net 0}}:{{$.RestPort}}/pools/default/buckets/bucket{{$offset}}/controller/doFlush"
  wait: true
  
# sleep
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true
- foreach: "{{range $i, $offset := mkrange 0 2}}"
  image: appropriate/curl
  command: "-u {{$.RestUsername}}:{{$.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/pools/default/buckets/bucket{{$offset}}/controller/doFlush"
  wait: true

#============ delete xdcr replications ============
- image: appropriate/curl
  command: "-u {{.RestUsername}}:{{.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/controller/cancelXDCR/{{(index (.AllLogs `ReplId` | json) 0).uuid}}%2F{{.NthBucket 0}}%2F{{.NthBucket 0}}
            -X DELETE"
  wait: true
- command: "-u {{.RestUsername}}:{{.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/controller/cancelXDCR/{{(index (.AllLogs `ReplId` | json) 0).uuid}}%2F{{.NthBucket 1}}%2F{{.NthBucket 1}}
            -X DELETE"
  wait: true
- command: "-u {{.RestUsername}}:{{.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/controller/cancelXDCR/{{(index (.AllLogs `ReplId` | json) 0).uuid}}%2F{{.NthBucket 2}}%2F{{.NthBucket 2}}
            -X DELETE"
  wait: true
- command: "-u {{.RestUsername}}:{{.RestPassword}} -X POST
            http://{{.Nodes | .Cluster 1 | net 0}}:{{$.RestPort}}/controller/cancelXDCR/{{(index (.AllLogs `RemoteReplId` | json) 0).uuid}}%2F{{.NthBucket 2}}%2F{{.NthBucket 2}}
            -X DELETE"
  wait: true
- command: "-u {{.RestUsername}}:{{.RestPassword}} -X POST
            http://{{$.Orchestrator}}:{{$.RestPort}}/controller/cancelXDCR/{{(index (.AllLogs `ReplId` | json) 0).uuid}}%2F{{.NthBucket 3}}%2F{{.NthBucket 3}}
            -X DELETE"
  wait: true
- command: "-u {{.RestUsername}}:{{.RestPassword}} -X POST
            http://{{.Nodes | .Cluster 1 | net 0}}:{{$.RestPort}}/controller/cancelXDCR/{{(index (.AllLogs `RemoteReplId` | json) 0).uuid}}%2F{{.NthBucket 4}}%2F{{.NthBucket 4}}
            -X DELETE"
  wait: true

#============ delete xdcr remotes ============
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "120"
  wait: true
- image: sequoiatools/couchbase-cli:8.1
  command:  "xdcr-setup -c {{$.Orchestrator}}:{{$.RestPort}} --delete --xdcr-cluster-name remote
             -u {{$.RestUsername}} -p {{$.RestPassword}}"
  wait: true
- command:  "xdcr-setup -c {{.Nodes | .Cluster 1 | net 0}} --delete --xdcr-cluster-name remote
             -u {{$.RestUsername}} -p {{$.RestPassword}}"
  wait: true