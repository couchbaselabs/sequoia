---
users:
  -
      name: bucket0
      password: password
      roles: admin
      auth_domain: local
  -
      name: bucket1
      password: password
      roles: admin
      auth_domain: local
  -
      name: bucket2
      password: password
      roles: admin
      auth_domain: local
  -
      name: bucket3
      password: password
      roles: admin
      auth_domain: local
  -
      name: bucket4
      password: password
      roles: admin
      auth_domain: local


buckets:
  -
      name: bucket0
      ram: 20%
      eviction: fullEviction
      storage: couchstore
      conflictresolution : timestamp
      rank : 2
  -
      name: bucket1
      ram: 20%
      eviction: fullEviction
      replica: 2
      enableEncryptionAtRest: true
      dekLifetime: 100
      dekRotateEvery: 50
      ddocs: scale
      compression: active
      rank : 1
  -
      name: bucket2
      ram: 15%
      eviction: fullEviction
      vbuckets: 1024
      historyretentionbytes: 2147483648
      historyretentionseconds: 3600
      enablehistoryretentionbydefault: 1
      conflictresolution : timestamp
  -
      name: bucket3
      ram: 10%
      type: ephemeral
  -
      name: bucket4
      ram: 10%
      type: ephemeral
      conflictresolution : timestamp

servers:
  -
      name: local
      count: 7
      ram: 95%
      rest_username: Administrator
      rest_password: password
      init_nodes: 5
      enable_encryption_at_rest: true
      enable_client_certificate_handling: true
      data_path: "/data"
      index_path: "/data"
      buckets: bucket0, bucket1, bucket2, bucket3, bucket4
      users: bucket0, bucket1, bucket2, bucket3, bucket4
  -
      name: remote
      count: 5
      ram: 95%
      rest_username: Administrator
      rest_password: password
      init_nodes: 3
      enable_encryption_at_rest: true
      enable_client_certificate_handling: true
      data_path: "/data"
      index_path: "/data"
      buckets: bucket0, bucket1, bucket2, bucket3, bucket4
      users: bucket0, bucket1, bucket2, bucket3, bucket4
