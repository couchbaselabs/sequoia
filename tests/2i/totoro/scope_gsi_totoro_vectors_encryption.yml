servers: # each server tag represents a cluster
  - name: local
    count: 12
    ram: 80%
    index_ram: 80%
    index_storage: default
    enable_config_encryption_at_rest: true
    enable_audit_encryption_at_rest: true
    enable_other_encryption_at_rest: true
    enable_diag_eval_on_non_local_hosts: true
    bypass_encryption_restrictions: true
    services:
      index: 5
      index_start: 7
      query: 2
      query_start: 5
    rest_username: Administrator
    rest_password: password
    data_path: "/data"
    index_path: "/data"
    init_nodes: 11
    buckets: bucket1, bucket2, bucket3, bucket4, bucket5, bucket6, bucket7, bucket8, bucket9, bucket10, bucket11, bucket12
    users: bucket1, bucket2, bucket3, bucket4, bucket5
