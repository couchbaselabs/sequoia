- include: tests/templates/kv.yml, tests/templates/rebalance.yml, tests/templates/fts.yml

############### Set FTS bleveMaxResultWindow to 100000 ################
- template: set_fts_manager_options
  args: "{{.Nodes | .Service `fts` | net 0}}, 'bleveMaxResultWindow':'100000'"

############### Set FTS bleveMaxClauseCount to 2500 ################
- template: set_fts_manager_options
  args: "{{.Nodes | .Service `fts` | net 0}}, 'bleveMaxClauseCount':'2500'"

############### Set FTS disableFileTransferRebalance to false ################
- template: set_fts_manager_options
  args: "{{.Nodes | .Service `fts` | net 0}}, 'disableFileTransferRebalance':false"

############### Set FTS seqChecksTimeoutInSec to 20 ################
- template: set_fts_manager_options
  args: "{{.Nodes | .Service `fts` | net 0}}, 'seqChecksTimeoutInSec':'20'"

############### create scopes and collections across buckets ###############
- image: sequoiatools/collections:1.0
  command: "-i {{.Orchestrator}}:8091 -b {{.Bucket}} -o create_multi_scope_collection -s scope_ -c coll_ --scope_count=2 --collection_count=10 --collection_distribution=random"
  wait: true
- command: "-i {{.Orchestrator}}:8091 -b {{.NthBucket 1}} -o create_multi_scope_collection -s scope_ -c coll_ --scope_count=2 --collection_count=10 --collection_distribution=random"
  wait: true

############### Sleep for some time to allow collections manifest to sync ###############
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true

############### Load company docs with vector embeddings via govectorloader ###############
- section_start: load_company_vector_data
- image: sequoiatools/govectorloader
  command: "-nodeAddress={{$.Orchestrator}} -username=Administrator -password=password -bucketName={{.Bucket}} -scopeName=scope_0 -collectionName=coll_0 -startIndex=0 -endIndex=15000 -datasetName=siftsmall -docSchema=company -embeddingFieldName=embedding -departmentsCount=2 -employeesPerDept=2 -projectsPerDept=2 -locationsCount=2 -documentIdPrefix=knn_hier_"
  wait: true
- command: "-nodeAddress={{$.Orchestrator}} -username=Administrator -password=password -bucketName={{.Bucket}} -scopeName=scope_0 -collectionName=coll_1 -startIndex=0 -endIndex=15000 -datasetName=siftsmall -docSchema=company -embeddingFieldName=embedding -departmentsCount=2 -employeesPerDept=2 -projectsPerDept=2 -locationsCount=2 -documentIdPrefix=knn_hier_"
  wait: true
- command: "-nodeAddress={{$.Orchestrator}} -username=Administrator -password=password -bucketName={{.NthBucket 1}} -scopeName=scope_0 -collectionName=coll_0 -startIndex=0 -endIndex=15000 -datasetName=siftsmall -docSchema=company -embeddingFieldName=embedding -departmentsCount=2 -employeesPerDept=2 -projectsPerDept=2 -locationsCount=2 -documentIdPrefix=knn_hier_"
  wait: true
- command: "-nodeAddress={{$.Orchestrator}} -username=Administrator -password=password -bucketName={{.NthBucket 1}} -scopeName=scope_0 -collectionName=coll_1 -startIndex=0 -endIndex=15000 -datasetName=siftsmall -docSchema=company -embeddingFieldName=embedding -departmentsCount=2 -employeesPerDept=2 -projectsPerDept=2 -locationsCount=2 -documentIdPrefix=knn_hier_"
  wait: true
- section_end: load_company_vector_data

############### Sleep to allow data to settle ###############
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true

###############  Create hierarchical KNN indexes ################
- section_start: create_hierarchical_knn_indexes
- image: sequoiatools/ftsindexmanager
  command: "-n {{.FTSNode}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.Bucket}} -m 1:1:6,1:0:4 -s {{.Scale 1}} -d siftsmall -a create_hierarchical_knn_index_from_map"
  wait: true

- command: "-n {{.FTSNode}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 1}} -m 1:1:6,1:0:4 -s {{.Scale 1}} -d siftsmall -a create_hierarchical_knn_index_from_map"
  wait: true
- section_end: create_hierarchical_knn_indexes

############### Wait for indexes to be built ###############
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true

################ Check for active queries #####################################
- section_start: monitor_active_queries
- image: sequoiatools/ftsindexmanager
  command: "-n {{.FTSNode}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.Bucket}} -a active_queries_check"
- section_end: monitor_active_queries

############### Run hierarchical KNN queries (filtered + non-filtered) ###############
- section_start: query_hierarchical_knn_indexes
- image: sequoiatools/ftsindexmanager
  command: "-n {{.Nodes | .Service `fts` | net 0}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.Bucket}} -d siftsmall -a run_hierarchical_knn_queries -nq 5 --print_interval 600"
  alias: knn_query_run_1
- command: "-n {{.Nodes | .Service `fts` | net 1}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 1}} -d siftsmall -a run_hierarchical_knn_queries -nq 5 --print_interval 600"
  alias: knn_query_run_2
- section_end: query_hierarchical_knn_indexes

# Sleep for 15 mins after starting queries
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "900"
  wait: true

# ###############  Rebalance in an FTS node ################
- template: rebalance_in
  args: "{{.InActiveNode}}, fts"
- template: wait_for_rebalance
  wait: true

# Sleep for 10 mins after rebalance
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

###############  Rebalance out data node ################
- template: rebalance_out
  args: "({{.NthDataNode 1}})"
  wait: true

# Sleep for some more time after rebalance completes
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true

###############  Add back data node ################
- template: rebalance_in
  args: "{{.InActiveNode}}"
  wait: true

# Sleep for some more time after rebalance completes
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true

# Rebalance out an FTS node
- template: rebalance_out
  args: "{{.Nodes | .Service `fts` | net 1}}"
  wait: true

# Sleep for 10 mins
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Swap Rebalance an FTS node
- template: rebalance_swap
  args: "{{.InActiveNode}}, {{.Nodes | .Service `fts` | net 1}}, fts"
  wait: true

# Sleep for 10 mins
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Swap Rebalance a data node
- template: rebalance_swap
  args: "{{.InActiveNode}}, {{.NthDataNode 2}}"
  wait: true

# Sleep for 10 mins
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

###############  Graceful Failover and recovery FTS node ################
- template: failover_and_recover
  args: "{{.Nodes | .Service `fts` | net 1}}, full"
  wait: true

# Sleep for some more time after rebalance completes
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true

# ###############  Rebalance in an FTS node ################
- template: rebalance_in
  args: "{{.InActiveNode}}, fts"
  wait: true

# Sleep for 10 mins
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

###############  Graceful Failover and addback data node ################
- template: failover_and_recover
  args: "{{.NthDataNode 1}}, full"
  wait: true

# Sleep for some more time after rebalance completes
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "300"
  wait: true

############### Stop all KNN queries ###############
- client:
    op: rm
    container: knn_query_run_1
- client:
    op: rm
    container: knn_query_run_2

- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

################ Check for item count #####################################
- section_start: fts_indexes_item_count_check
- image: sequoiatools/ftsindexmanager
  command: "-n {{.FTSNode}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.Bucket}} -a item_count_check -vt 1200"
  wait: true
- section_end: fts_indexes_item_count_check

- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

###############  Drop all Indexes ################
- section_start: drop_all_indexes
- image: sequoiatools/ftsindexmanager
  command: "-n {{.FTSNode}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.Bucket}} -a delete_all_indexes"
  wait: true
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

- image: sequoiatools/ftsindexmanager
  command: "-n {{.FTSNode}} -o {{.RestPort}} -u {{.RestUsername}} -p {{.RestPassword}} -b {{.NthBucket 1}} -a delete_all_indexes"
  wait: true
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Sleep for some time to allow DDL to complete in the background
- image: sequoiatools/cmd
  entrypoint: sleep
  command: "1200"
  wait: true
- section_end: drop_all_indexes
