  command: "kv --ops {{.Scale 2000}} --create 60 --update 25 --delete 20 --expire 10 --ttl 1200 --hosts {{.Orchestrator}} --bucket {{.NthBucket 4}} --user {{.RestUsername}} --password {{.RestPassword}}"
  alias: GideonContainer5

# Wait for some time to let the load stabilize before taking backup
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take first backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Rebalance out a node
-
  template: rebalance_out
  args: "{{.Nodes | net 2}}"
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Rebalance-in a node
-
  template: rebalance_in
  args: "{{.Nodes | net 2}}"
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Failover a node
