###### update Tombstone Purge Interval ######
-
  image: sequoiatools/couchbase-cli:7.6
  requires:  "{{eq true .DoOnce }}"
  command: "setting-compaction -c {{.Orchestrator}} -u  {{.RestUsername}} -p  {{.RestPassword}} --metadata-purge-interval 0.25 --compaction-db-percentage 30 --compaction-view-percentage 30"
  wait: true

############### Initial data loading ################
-
  image: sequoiatools/gideon_latest
  command: "kv --ops {{.Scale 5000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.Bucket}}  --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 600
  alias: GideonContainer1
-
  command: "kv --ops {{.Scale 5000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 1}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 600
  alias: GideonContainer2
-
  command: "kv --ops {{.Scale 5000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 2}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 600
  alias: GideonContainer3
-
  command: "kv --ops {{.Scale 5000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 3}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 600
  alias: GideonContainer4
-
  command: "kv --ops {{.Scale 5000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 4}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 600
  alias: GideonContainer5

# Wait for some time to let the load stabilize before taking backup
-
   image: sequoiatools/cmd
   entrypoint: sleep
   command: "600"
   wait: true
-
  section_end: initial_data_load

