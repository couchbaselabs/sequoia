  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  expect_error: true

# Wait for backup to start
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "60"
  wait: true

# Stop couchbase on a node during backup
-
  image: sequoiatools/cbutil
  command: "/cbinit.py {{.Nodes | net 3}} root couchbase stop"
  wait: true

# Wait for backup to fail
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "60"
  wait: true

# Start couchbase on the node
-
  image: sequoiatools/cbutil
  command: "/cbinit.py {{.Nodes | net 3}} root couchbase start"
  wait: true

# Wait for node to come back up
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "120"
  wait: true

# Resume the backup
-
  template: resume_backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Continue data loading
