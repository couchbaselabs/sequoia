  template: recover_node
  args: "{{.Nodes | net 2}}, full"
  wait: true
-
  template: rebalance
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Rebalance-out a node
-
  template: rebalance_out
  args: "{{.Nodes | net 2}}"
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Auto failover node
-
  template: autofailover1Node
  args: "{{.ActiveDataNode 1}}"
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "900"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Merge all backups
-
  image: sequoiatools/cbbackupmgr
  command: "cbbackupmerge.py {{.Nodes | .Service `n1ql` | net 0}} {{.SSHUsername}} {{.SSHPassword}} /data/archive systemtestbackup"
  wait: true

# Stop data loading
-
  client:
    op: rm
    container: "GideonContainer1"
    wait: true
-
  client:
    op: rm
    container: "GideonContainer2"
    wait: true
-
  client:
    op: rm
    container: "GideonContainer3"
    wait: true
-
  client:
    op: rm
    container: "GideonContainer4"
    wait: true
-
  client:
    op: rm
    container: "GideonContainer5"
    wait: true

# Wait for some time to let the load stop before flush and restore
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Flush Bucket
-
  image: sequoiatools/couchbase-cli
  command:  "bucket-flush -c  {{.Orchestrator}}:{{.RestPort}} --bucket {{.NthBucket 1}} -u  {{.RestUsername}} -p  {{.RestPassword}} --force"
  wait: true
-
  command: "bucket-flush -c  {{.Orchestrator}}:{{.RestPort}} --bucket {{.NthBucket 2}} -u  {{.RestUsername}} -p  {{.RestPassword}} --force"
  wait: true
-
  command: "bucket-flush -c  {{.Orchestrator}}:{{.RestPort}} --bucket {{.NthBucket 3}} -u  {{.RestUsername}} -p  {{.RestPassword}} --force"
  wait: true
-
  command: "bucket-flush -c  {{.Orchestrator}}:{{.RestPort}} --bucket {{.NthBucket 4}} -u  {{.RestUsername}} -p  {{.RestPassword}} --force"
  wait: true
-
  command: "bucket-flush -c  {{.Orchestrator}}:{{.RestPort}} --bucket {{.Bucket}} -u  {{.RestUsername}} -p  {{.RestPassword}} --force"
  wait: true

# Restore to all buckets
-
  template: restore_backup
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

-
  section_end: incremental_backup_merge

