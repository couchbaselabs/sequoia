-
  section_start: initial_data_load

############### Initial data loading ################
-
  image: sequoiatools/gideon_latest
  command: "kv --ops {{.Scale 10000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.Bucket}}  --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 300
  alias: GideonContainer1
-
  command: "kv --ops {{.Scale 10000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 1}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 300
  alias: GideonContainer2
-
  command: "kv --ops {{.Scale 10000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 2}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 300
  alias: GideonContainer3
-
  command: "kv --ops {{.Scale 10000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 3}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 300
  alias: GideonContainer4
-
  command: "kv --ops {{.Scale 10000}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 4}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 300
  alias: GideonContainer5

# Wait for some time to let the load stabilize before taking backup
-
   image: sequoiatools/cmd
   entrypoint: sleep
   command: "600"
   wait: true
-
  section_end: initial_data_load


-
  section_start: incremental_backup_merge

# Configure backup repo
-
  template: configure_backup_repo
  args: "{{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

############### data loading ################
-
  image: sequoiatools/gideon_latest
  command: "kv --ops {{.Scale 2000}} --create 60 --update 25 --delete 20 --expire 10 --ttl 1200 --hosts {{.Orchestrator}} --bucket {{.Bucket}}  --user {{.RestUsername}} --password {{.RestPassword}}"
  alias: GideonContainer1
-
  command: "kv --ops {{.Scale 2000}} --create 60 --update 25 --delete 20 --expire 10 --ttl 1200 --hosts {{.Orchestrator}} --bucket {{.NthBucket 1}} --user {{.RestUsername}} --password {{.RestPassword}}"
  alias: GideonContainer2
-
  command: "kv --ops {{.Scale 2000}} --create 60 --update 25 --delete 20 --expire 10 --ttl 1200 --hosts {{.Orchestrator}} --bucket {{.NthBucket 2}} --user {{.RestUsername}} --password {{.RestPassword}}"
  alias: GideonContainer3
-
  command: "kv --ops {{.Scale 2000}} --create 60 --update 25 --delete 20 --expire 10 --ttl 1200 --hosts {{.Orchestrator}} --bucket {{.NthBucket 3}} --user {{.RestUsername}} --password {{.RestPassword}}"
  alias: GideonContainer4
