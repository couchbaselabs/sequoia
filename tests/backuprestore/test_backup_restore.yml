-
  template: rebalance_in
  args: "{{.Nodes | net 3}}"
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Failover a node
-
  template: failover_node
  args: "{{.Nodes | net 2}}"
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Recover node
-
  template: recover_node
  args: "{{.Nodes | net 2}}, delta"
  wait: true
-
  template: rebalance
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Merge all backups
-
  image: sequoiatools/cbbackupmgr
  command: "cbbackupmerge.py {{.Nodes | .Service `n1ql` | net 0}} {{.SSHUsername}} {{.SSHPassword}} /data/archive systemtestbackup"
  wait: true

# Hard Failover a node
-
  template: hard_failover_node
  args: "{{.Nodes | net 2}}"
  wait: true

# Continue data loading
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Take an incremental backup
-
  template: backup_cluster
  args: "{{.Nodes | .Service `n1ql` | net 0}}, {{.Nodes | .Service `n1ql` | net 0}}, /data/archive, systemtestbackup"
  wait: true

# Recover node
