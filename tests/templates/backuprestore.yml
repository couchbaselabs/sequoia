-
# Configure
  name: configure_backup_repo
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 mkdir -p $1 ;chmod -R 777 $1; /opt/couchbase/bin/cbbackupmgr config -a $1 -r $2"

-
# Backup
# $0 = Cluster to be backed up
  name: backup_cluster
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr backup -c $1 -u {{.RestUsername}} -p {{.RestPassword}} -a $2 -r $3 -t 10"
-
# Resume Backup
# $0 = Cluster to be backed up
  name: resume_backup_cluster
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr backup -c $1 -u {{.RestUsername}} -p {{.RestPassword}} -a $2 -r $3 -t 10 --resume"
-
# Purge Backup
# $0 = Cluster to be backed up
  name: purge_backup_cluster
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr backup -c $1 -u {{.RestUsername}} -p {{.RestPassword}} -a $2 -r $3 -t 10 --purge"
-
# Restore
# $0 = Destination cluster to restore to
  name: restore_backup
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                    ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr restore -c $1 -u  {{.RestUsername}} -p  {{.RestPassword}} -a $2 -r $3 -t 10"
-
# Resume Restore
# $0 = Destination cluster to restore to
  name: resume_restore_backup
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                    ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr restore -c $1 -u  {{.RestUsername}} -p  {{.RestPassword}} -a $2 -r $3 -t 10 --resume"
-
# Purge Restore
# $0 = Destination cluster to restore to
  name: purge_restore_backup
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                    ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr restore -c $1 -u  {{.RestUsername}} -p  {{.RestPassword}} -a $2 -r $3 -t 10 --purge"
-
# Remove backup repo
  name: clean_backup_repo
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr remove -a $1 -r $2"

###############################################################################
# AWS S3 cbbackupmgr templates
#
# Credentials are read from the environment of the SSH host:
#   $AWS_ACCESS_KEY_ID
#   $AWS_SECRET_ACCESS_KEY
#
# Archive paths must be of the form s3://<bucket>/<prefix>
###############################################################################

-
# Configure AWS S3 backup repo
# $0 = SSH host running cbbackupmgr
# $1 = archive path (e.g. s3://my-bucket/backups)
# $2 = repo name
# $3 = obj-staging-dir (e.g. /data/s3_staging)
  name: configure_backup_repo_aws
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0
                    source /etc/profile.d/s3_credentials.sh;
                    /opt/couchbase/bin/cbbackupmgr config
                      -a $1 -r $2
                      --obj-staging-dir $3
                      --obj-region us-east-1
                      --obj-access-key-id $AWS_ACCESS_KEY_ID
                      --obj-secret-access-key $AWS_SECRET_ACCESS_KEY"

-
# Backup to AWS S3
# $0 = SSH host running cbbackupmgr
# $1 = cluster to backup
# $2 = archive path (s3://...)
# $3 = repo name
# $4 = obj-staging-dir
  name: backup_cluster_aws
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0
                    source /etc/profile.d/s3_credentials.sh;
                    /opt/couchbase/bin/cbbackupmgr backup
                      -c $1 -u {{.RestUsername}} -p {{.RestPassword}}
                      -a $2 -r $3 -t 10
                      --obj-staging-dir $4
                      --obj-region us-east-1
                      --obj-access-key-id $AWS_ACCESS_KEY_ID
                      --obj-secret-access-key $AWS_SECRET_ACCESS_KEY"

-
# Resume an AWS S3 backup
  name: resume_backup_cluster_aws
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0
                    source /etc/profile.d/s3_credentials.sh;
                    /opt/couchbase/bin/cbbackupmgr backup
                      -c $1 -u {{.RestUsername}} -p {{.RestPassword}}
                      -a $2 -r $3 -t 10 --resume
                      --obj-staging-dir $4
                      --obj-region us-east-1
                      --obj-access-key-id $AWS_ACCESS_KEY_ID
                      --obj-secret-access-key $AWS_SECRET_ACCESS_KEY"

-
# Purge an AWS S3 backup
  name: purge_backup_cluster_aws
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0
                    source /etc/profile.d/s3_credentials.sh;
                    /opt/couchbase/bin/cbbackupmgr backup
                      -c $1 -u {{.RestUsername}} -p {{.RestPassword}}
                      -a $2 -r $3 -t 10 --purge
                      --obj-staging-dir $4
                      --obj-region us-east-1
                      --obj-access-key-id $AWS_ACCESS_KEY_ID
                      --obj-secret-access-key $AWS_SECRET_ACCESS_KEY"

-
# Restore from AWS S3
# $0 = SSH host
# $1 = destination cluster
# $2 = archive path (s3://...)
# $3 = repo name
# $4 = obj-staging-dir
  name: restore_backup_aws
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0
                    source /etc/profile.d/s3_credentials.sh;
                    /opt/couchbase/bin/cbbackupmgr restore
                      -c $1 -u {{.RestUsername}} -p {{.RestPassword}}
                      -a $2 -r $3 -t 10
                      --obj-staging-dir $4
                      --obj-region us-east-1
                      --obj-access-key-id $AWS_ACCESS_KEY_ID
                      --obj-secret-access-key $AWS_SECRET_ACCESS_KEY"

-
# Resume restore from AWS S3
  name: resume_restore_backup_aws
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0
                    source /etc/profile.d/s3_credentials.sh;
                    /opt/couchbase/bin/cbbackupmgr restore
                      -c $1 -u {{.RestUsername}} -p {{.RestPassword}}
                      -a $2 -r $3 -t 10 --resume
                      --obj-staging-dir $4
                      --obj-region us-east-1
                      --obj-access-key-id $AWS_ACCESS_KEY_ID
                      --obj-secret-access-key $AWS_SECRET_ACCESS_KEY"

-
# Purge restore from AWS S3
  name: purge_restore_backup_aws
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0
                    source /etc/profile.d/s3_credentials.sh;
                    /opt/couchbase/bin/cbbackupmgr restore
                      -c $1 -u {{.RestUsername}} -p {{.RestPassword}}
                      -a $2 -r $3 -t 10 --purge
                      --obj-staging-dir $4
                      --obj-region us-east-1
                      --obj-access-key-id $AWS_ACCESS_KEY_ID
                      --obj-secret-access-key $AWS_SECRET_ACCESS_KEY"

-
# Remove an AWS S3 backup repo
# $0 = SSH host
# $1 = archive (s3://...)
# $2 = repo name
# $3 = obj-staging-dir
  name: clean_backup_repo_aws
  actions:
    -
      image: "sequoiatools/cmd"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0
                    source /etc/profile.d/s3_credentials.sh;
                    /opt/couchbase/bin/cbbackupmgr remove
                      -a $1 -r $2
                      --obj-staging-dir $3
                      --obj-region us-east-1
                      --obj-access-key-id $AWS_ACCESS_KEY_ID
                      --obj-secret-access-key $AWS_SECRET_ACCESS_KEY"

###############################################################################
