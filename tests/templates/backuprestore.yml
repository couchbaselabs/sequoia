-
# Configure
  name: configure_backup_repo
  actions:
    -
      image: "vijayviji/sshpass"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 mkdir -p $1 ;chmod -R 777 $1; /opt/couchbase/bin/cbbackupmgr config -a $1 -r $2"

-
# Backup
# $0 = Cluster to be backed up
  name: backup_cluster
  actions:
    -
      image: "vijayviji/sshpass"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr backup -c $1 -u {{.RestUsername}} -p {{.RestPassword}} -a $2 -r $3 -t 10"
-
# Resume Backup
# $0 = Cluster to be backed up
  name: resume_backup_cluster
  actions:
    -
      image: "vijayviji/sshpass"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr backup -c $1 -u {{.RestUsername}} -p {{.RestPassword}} -a $2 -r $3 -t 10 --resume"
-
# Purge Backup
# $0 = Cluster to be backed up
  name: purge_backup_cluster
  actions:
    -
      image: "vijayviji/sshpass"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr backup -c $1 -u {{.RestUsername}} -p {{.RestPassword}} -a $2 -r $3 -t 10 --purge"
-
# Restore
# $0 = Destination cluster to restore to
  name: restore_backup
  actions:
    -
      image: "vijayviji/sshpass"
      command: "sshpass -p {{.SSHPassword}}
                    ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr restore -c $1 -u  {{.RestUsername}} -p  {{.RestPassword}} -a $2 -r $3 -t 10"

-
# Remove backup repo
  name: clean_backup_repo
  actions:
    -
      image: "vijayviji/sshpass"
      command: "sshpass -p {{.SSHPassword}}
                  ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@$0 /opt/couchbase/bin/cbbackupmgr remove -a $1 -r $2"
