---
buckets:
  -
      name: default
      ram: 35%
      eviction: fullEviction
      replica: 1
      storage: magma
      historyretentionseconds: 86400
      enablehistoryretentionbydefault: 1
      enable_continuous_backup: true
      continuous_backup_interval: 60
      continuous_backup_location: /mnt/nfs_data/test_system_continuous_backup
  -
      name: bucket1
      ram: 30%
      eviction: fullEviction
      replica: 1
      storage: magma
      historyretentionseconds: 1800
      enablehistoryretentionbydefault: 1
      vbuckets: 1024
      enable_continuous_backup: true
      continuous_backup_interval: 15
      continuous_backup_location: /mnt/nfs_data/test_system_continuous_backup
  -
      name: bucket2
      ram: 35%
      eviction: fullEviction
      replica: 1
      historyretentionseconds: 900
      enablehistoryretentionbydefault: 1
      storage: magma
      enable_continuous_backup: true
      continuous_backup_interval: 2
      continuous_backup_location: /mnt/nfs_data/test_system_continuous_backup


servers: # each server tag represents a cluster
  -
      name: local
      count: 6
      ram: 75%
      rest_username: Administrator
      rest_password: password
      init_nodes: 6
      data_path: "/data/dta"
      index_path: "/data/index"
      buckets: default, bucket1, bucket2
      services:
        data: 5
        arbiter: 1
  -
      name: remote
      count: 1
      ram: 75%
      rest_username: Administrator
      rest_password: password
      data_path: "/data/dta"
      index_path: "/data/index"
      init_nodes: 1