  image: vijayviji/sshpass
  command: "sshpass -p {{.SSHPassword}} ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@{{.Nodes | .Service `arbiter` | net 0}} 'echo $(date -u +%Y-%m-%dT%H:%M:%SZ) >> /tmp/timestamps.txt'"
  wait: true

##### PITR starts now #####

# Stop data loading
-
  client:
    op: rm
    container: "magmaloader_bucket_doc_ops"
    wait: true
-
  client:
    op: rm
    container: "magmaloader_bucket1_doc_ops"
    wait: true
-
  client:
    op: rm
    container: "magmaloader_bucket2_doc_ops"
    wait: true

-
  client:
    op: rm
    container: "GideonContainer1"
    wait: true
-
  client:
    op: rm
    container: "GideonContainer2"
    wait: true
-
  client:
    op: rm
    container: "GideonContainer3"
    wait: true


# Wait for some time to let the load stop before flush and restore
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "600"
  wait: true

# Disable continuous backup before flush
-
  image: sequoiatools/couchbase-cli
  command:  "bucket-edit -c  {{.Orchestrator}}:{{.RestPort}} --bucket {{.NthBucket 1}} -u {{.RestUsername}} -p {{.RestPassword}} --continuous-backup-enabled 0"
  wait: true
-
  command: "bucket-edit -c  {{.Orchestrator}}:{{.RestPort}} --bucket {{.NthBucket 2}} -u {{.RestUsername}} -p {{.RestPassword}} --continuous-backup-enabled 0"
  wait: true
-
  command: "bucket-edit -c  {{.Orchestrator}}:{{.RestPort}} --bucket {{.Bucket}} -u {{.RestUsername}} -p {{.RestPassword}} --continuous-backup-enabled 0"
  wait: true

