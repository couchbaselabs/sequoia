-
  include: tests/templates/kv.yml, tests/templates/backuprestore.yml, tests/templates/rebalance.yml, tests/templates/multinode_failure.yml, tests/templates/collections.yml

- 
  section_start: setup_cloud_backup

# Disable autofailover
-
  template: disable_autofailover
  requires:  "{{eq true .DoOnce }}"

# Enable node-to-node encryption
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "node-to-node-encryption -c {{.Orchestrator}}:8091 -u {{.RestUsername}} -p {{.RestPassword}} --enable"
  wait: true

# Setting cluster encryption level to all
-
  image: sequoiatools/couchbase-cli:8.1
  requires:  "{{eq true .DoOnce }}"
  command: "setting-security -c {{.Orchestrator}}:8091 -u {{.RestUsername}} -p {{.RestPassword}} --set --cluster-encryption-level all"
  wait: true

# Add Azure Credentials
-
  image: vijayviji/sshpass
  command: "sshpass -p {{.SSHPassword}}
              ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@{{.Orchestrator}}
                'source /etc/profile.d/azure_credentials.sh; curl localhost:8091/settings/credentials/systemtest-azure-id -u {{.RestUsername}}:{{.RestPassword}} --json '\"'\"'{\"type\": \"azureShared\", \"fields\": {\"accountName\": \"'\"'\"'$AZURE_STORAGE_ACCOUNT'\"'\"'\", \"accountKey\": \"'\"'\"'$AZURE_STORAGE_KEY'\"'\"'\", \"endpoint\": \"'\"'\"'$AZURE_STORAGE_ENDPOINT'\"'\"'\"}}'\"'\"''"
  wait: true

# Grant backup service access to S3 credentials
-
  image: vijayviji/sshpass
  command: "sshpass -p {{.SSHPassword}}
              ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@{{.Orchestrator}}
                'curl -X PUT -u {{.RestUsername}}:{{.RestPassword}} http://localhost:8091/settings/rbac/services/backup/roles -d \"roles=credential_consumer[systemtest-azure-id]\"'"
  wait: true

# Update bucket configurations to enable continuous backup
-
  image: vijayviji/sshpass
  command: "sshpass -p {{.SSHPassword}}
              ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@{{.Orchestrator}}
                'curl -X POST localhost:8091/pools/default/buckets/{{.Bucket}} -u {{.RestUsername}}:{{.RestPassword}} -d name={{.Bucket}} -d continuousBackupEnabled=true -d continuous_backup_cloud_storage_cred_id=systemtest-azure-id -d continuousBackupLocation=az://continuous-backup-system-test/continuous-backups -d continuousBackupInterval=60'"
  wait: true
-
  image: vijayviji/sshpass
  command: "sshpass -p {{.SSHPassword}}
              ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@{{.Orchestrator}}
                'curl -X POST localhost:8091/pools/default/buckets/{{.NthBucket 1}} -u {{.RestUsername}}:{{.RestPassword}} -d name={{.NthBucket 1}} -d continuousBackupEnabled=true -d continuous_backup_cloud_storage_cred_id=systemtest-azure-id -d continuousBackupLocation=az://continuous-backup-system-test/continuous-backups -d continuousBackupInterval=15'"
  wait: true
-
  image: vijayviji/sshpass
  command: "sshpass -p {{.SSHPassword}}
              ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@{{.Orchestrator}}
                'curl -X POST localhost:8091/pools/default/buckets/{{.NthBucket 2}} -u {{.RestUsername}}:{{.RestPassword}} -d name={{.NthBucket 2}} -d continuousBackupEnabled=true -d continuous_backup_cloud_storage_cred_id=systemtest-azure-id -d continuousBackupLocation=az://continuous-backup-system-test/continuous-backups -d continuousBackupInterval=2'"
  wait: true

# Enable auto failover again
-
  template: enable_autofailover
  args: "120,1"
  requires:  "{{eq true .DoOnce }}"

-
  section_end: setup_cloud_backup

-
  section_start: initial_data_load

###### update Tombstone Purge Interval ######
-
  image: sequoiatools/couchbase-cli:7.6
  requires:  "{{eq true .DoOnce }}"
  command: "setting-compaction -c {{.Orchestrator}} -u  {{.RestUsername}} -p  {{.RestPassword}} --metadata-purge-interval 0.25 --compaction-db-percentage 30 --compaction-view-percentage 30"
  wait: true

############### Create scopes and collections across all buckets ###############
- template: create-multi-scopes-collections
  args: "{{.Orchestrator}}, {{.Bucket}}, {{.Scale 2}}, {{.Scale 10}}, uniform"
  requires:  "{{eq true .DoOnce }}"
-
  args: "{{.Orchestrator}}, {{.NthBucket 1}}, {{.Scale 2}}, {{.Scale 10}}, uniform"
  requires:  "{{eq true .DoOnce }}"
-
  args: "{{.Orchestrator}}, {{.NthBucket 2}}, {{.Scale 2}}, {{.Scale 10}}, uniform"
  requires:  "{{eq true .DoOnce }}"


############### Sleep for some time to allow collections manifest to sync ###############
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "60"
  wait: true

############### Initial data loading ################
-
  image: sequoiatools/gideon_latest
  command: "kv --ops {{.Scale 500}} --create 100 --hosts {{.Orchestrator}} --bucket {{.Bucket}}  --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 600
  alias: GideonContainer1
-
  command: "kv --ops {{.Scale 500}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 1}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 600
  alias: GideonContainer2
-
  command: "kv --ops {{.Scale 500}} --create 100 --hosts {{.Orchestrator}} --bucket {{.NthBucket 2}} --user {{.RestUsername}} --password {{.RestPassword}}"
  duration: 600
  alias: GideonContainer3


############### Initial data loading across all collections ################
- image: sequoiatools/magmaloader
  command: "--host {{.Orchestrator}} --user {{.RestUsername}} --password {{.RestPassword}} --bucket {{.Bucket}} --start 0 --end {{.Scale 100000}} --pc 100 --doc_template Hotel --all_coll True"
  alias: magmaloader_bucket_doc_ops1
  requires: "{{eq true .DoOnce }}"
  wait: true
- command: "--host {{.Orchestrator}} --user {{.RestUsername}} --password {{.RestPassword}} --bucket {{.NthBucket 1}} --start 0 --end {{.Scale 100000}} --pc 100 --doc_template Hotel --all_coll True"
  alias: magmaloader_bucket1_doc_ops1
  requires: "{{eq true .DoOnce }}"
  wait: true
- command: "--host {{.Orchestrator}} --user {{.RestUsername}} --password {{.RestPassword}} --bucket {{.NthBucket 2}} --start 0 --end {{.Scale 100000}} --pc 100 --doc_template Hotel --all_coll True"
  alias: magmaloader_bucket2_doc_ops1
  requires: "{{eq true .DoOnce }}"
  wait: true

# Wait for some time to let the load stabilize before taking backup
-
   image: sequoiatools/cmd
   entrypoint: sleep
   command: "600"
   wait: true

# Wait for some time to let the load stabilize before taking backup
-
   image: sequoiatools/cmd
   entrypoint: sleep
   command: "120"
   wait: true

-
  section_end: initial_data_load

