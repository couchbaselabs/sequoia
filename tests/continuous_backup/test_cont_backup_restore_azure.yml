# Chaos: Stop couchbase on one node and start again
# Stop couchbase on a node
-
  image: sequoiatools/cbutil
  command: "/cbinit.py {{.Nodes | .Service `kv` | net 3}} root couchbase stop"
  wait: true

# Record timestamp
-
  image: vijayviji/sshpass
  command: "sshpass -p {{.SSHPassword}} ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@{{.Nodes | .Service `arbiter` | net 0}} 'echo $(date -u +%Y-%m-%dT%H:%M:%SZ) >> /tmp/timestamps.txt'"
  wait: true

# Wait for a while before starting the node again
-
  image: sequoiatools/cmd
  entrypoint: sleep
  command: "60"
  wait: true

# Start couchbase on the node
-
  image: sequoiatools/cbutil
  command: "/cbinit.py {{.Nodes | .Service `kv` | net 3}} root couchbase start"
  wait: true

