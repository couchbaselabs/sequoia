  image: sequoiatools/cmd
  entrypoint: sleep
  command: "60"
  wait: true

# Kill memcached on a node during rebalance
-
  template: kill_process
  args: "{{.Nodes | .Service `kv` | net 3}}, memcached"
  expect_error: true

# Wait for rebalance to fail
