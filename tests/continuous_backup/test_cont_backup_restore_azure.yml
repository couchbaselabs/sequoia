# Configure /tmp/timestamps.txt to record timestamps of operations
-
  image: vijayviji/sshpass
  command: "sshpass -p {{.SSHPassword}} ssh -o StrictHostKeyChecking=no {{.SSHUsername}}@{{.Nodes | .Service `arbiter` | net 0}} 'rm -f /tmp/timestamps.txt && touch /tmp/timestamps.txt'"
  wait: true

############### data loading ################
-
  image: sequoiatools/gideon_latest
  command: "kv --ops {{.Scale 500}} --create 35 --update 30 --delete 20 --expire 15 --ttl 1200 --hosts {{.Orchestrator}} --bucket {{.Bucket}}  --user {{.RestUsername}} --password {{.RestPassword}}"
  alias: GideonContainer1
-
  command: "kv --ops {{.Scale 500}} --create 35 --update 30 --delete 20 --expire 15 --ttl 1200 --hosts {{.Orchestrator}} --bucket {{.NthBucket 1}} --user {{.RestUsername}} --password {{.RestPassword}}"
  alias: GideonContainer2
-
  command: "kv --ops {{.Scale 500}} --create 35 --update 30 --delete 20 --expire 15 --ttl 1200 --hosts {{.Orchestrator}} --bucket {{.NthBucket 2}} --user {{.RestUsername}} --password {{.RestPassword}}"
  alias: GideonContainer3


############### data loading across all collections ################
-
  image: sequoiatools/magmaloader
  command: "--host {{.Orchestrator}} --user {{.RestUsername}} --password {{.RestPassword}} --bucket {{.Bucket}} --start 100000 --end {{.Scale 25000000}} --pc 35 --pu 30 --pd 20 --expiry_mode True --percentage_expiry 30 --max_ttl {{.Scale 7200}} --doc_template Hotel --all_coll True --ops_rate {{.Scale 100}} --skip_default True"
  alias: magmaloader_bucket_doc_ops
-
  command: "--host {{.Orchestrator}} --user {{.RestUsername}} --password {{.RestPassword}} --bucket {{.NthBucket 1}} --start 100000 --end {{.Scale 25000000}} --pc 35 --pu 30 --pd 20 --expiry_mode True --percentage_expiry 30 --max_ttl {{.Scale 7200}} --doc_template Hotel --all_coll True --ops_rate {{.Scale 100}} --skip_default True"
  alias: magmaloader_bucket1_doc_ops
-
  command: "--host {{.Orchestrator}} --user {{.RestUsername}} --password {{.RestPassword}} --bucket {{.NthBucket 2}} --start 100000 --end {{.Scale 25000000}} --pc 35 --pu 30 --pd 20 --expiry_mode True --percentage_expiry 30 --max_ttl {{.Scale 7200}} --doc_template Hotel --all_coll True --ops_rate {{.Scale 100}} --skip_default True"
  alias: magmaloader_bucket2_doc_ops


